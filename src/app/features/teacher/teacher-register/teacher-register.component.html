<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-2xl font-bold text-gray-950">Time<span class="text-blue-600">Tutor</span></div>
      <div class="text-sm text-gray-500 mt-1">Espace Enseignant</div>
    </div>

    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
      <h1 class="text-xl font-bold text-gray-950 mb-1">Créer mon compte enseignant</h1>
      <p class="text-sm text-gray-500 mb-6">Accédez à toutes vos invitations de sessions en un seul endroit.</p>

      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-4">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Nom complet</label>
          <input formControlName="fullName" type="text" placeholder="Jean Dupont"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Email</label>
          <input formControlName="email" type="email" placeholder="jean@ecole.fr"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Mot de passe</label>
          <input formControlName="password" type="password" placeholder="8 caractères minimum"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <button type="submit" [disabled]="form.invalid || loading()"
          class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-semibold px-5 py-3 rounded-xl text-sm transition-all">
          {{ loading() ? 'Création...' : 'Créer mon compte' }}
        </button>
      </form>

      <div class="mt-5 text-center text-sm text-gray-500">
        Déjà un compte ?
        <a routerLink="/login" class="text-blue-600 font-medium hover:underline">Se connecter</a>
      </div>
      <div class="mt-2 text-center text-sm text-gray-500">
        Vous avez un lien d'invitation ?
        <span class="text-gray-400">Utilisez-le directement — pas besoin de compte.</span>
      </div>
    </div>

    <div class="mt-6 text-center">
      <a routerLink="/" class="text-sm text-gray-400 hover:text-gray-600">← Retour à l'accueil</a>
    </div>
  </div>
</div>
