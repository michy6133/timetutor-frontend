<div class="max-w-2xl mx-auto px-6 py-8">
  <div class="flex items-center gap-4 mb-7">
    <div class="w-11 h-11 rounded-xl bg-brick/10 flex items-center justify-center">
      <svg class="w-6 h-6 text-brick" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <div>
      <h1 class="font-display text-2xl font-extrabold text-navy">Mon Profil</h1>
      <p class="text-sm text-navy/40 mt-0.5">Gérez vos informations personnelles.</p>
    </div>
  </div>

  <!-- Profile form -->
  <div class="bg-white rounded-2xl border border-steel/60 shadow-sm p-7 mb-6">
    <h2 class="font-display font-bold text-navy mb-5">Informations personnelles</h2>
    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-4">
      <div>
        <label class="tt-label">Nom complet</label>
        <input formControlName="fullName" type="text" class="tt-input" placeholder="Votre nom" />
      </div>
      <div>
        <label class="tt-label">Email</label>
        <input formControlName="email" type="email" class="tt-input opacity-60 cursor-not-allowed" />
        <p class="text-xs text-navy/35 mt-1">L'email ne peut pas être modifié.</p>
      </div>
      <div>
        <label class="tt-label">Téléphone</label>
        <input formControlName="phone" type="tel" class="tt-input" placeholder="+229 ..." />
      </div>
      <div class="pt-2">
        <button type="submit" [disabled]="profileForm.invalid || saving()"
          class="btn-brick px-6 py-2.5 text-sm">
          @if (saving()) { <span class="spinner mr-2"></span> }
          Enregistrer
        </button>
      </div>
    </form>
  </div>

  <!-- Password section -->
  <div class="bg-white rounded-2xl border border-steel/60 shadow-sm p-7">
    <h2 class="font-display font-bold text-navy mb-5">Sécurité — Changer le mot de passe</h2>
    <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="space-y-4">
      <div>
        <label class="tt-label">Mot de passe actuel</label>
        <input formControlName="currentPassword" type="password" class="tt-input" placeholder="••••••••" />
      </div>
      <div>
        <label class="tt-label">Nouveau mot de passe</label>
        <input formControlName="newPassword" type="password" class="tt-input" placeholder="8 caractères minimum" />
      </div>
      <div class="pt-2">
        <button type="submit" [disabled]="passwordForm.invalid || savingPwd()"
          class="btn-ghost-navy px-6 py-2.5 text-sm">
          @if (savingPwd()) { <span class="spinner-dark spinner mr-2"></span> }
          Changer le mot de passe
        </button>
      </div>
    </form>
  </div>
</div>
