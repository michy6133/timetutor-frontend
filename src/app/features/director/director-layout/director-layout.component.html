<div class="min-h-screen flex bg-gray-50">
  <aside class="w-56 shrink-0 border-r border-gray-200 bg-white flex flex-col sticky top-0 h-screen">
    <div class="p-5 border-b border-gray-100">
      <a routerLink="/director/dashboard" class="text-lg font-bold text-gray-950 tracking-tight block">
        Time<span class="text-blue-600">Tutor</span>
      </a>
      <p class="text-xs text-gray-500 mt-1">Espace direction</p>
    </div>
    <nav class="p-3 flex flex-col gap-0.5 flex-1">
      <a
        routerLink="/director/dashboard"
        routerLinkActive="bg-blue-50 text-blue-700 border-blue-200"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 border border-transparent transition-colors"
      >
        <app-svg-icon name="layout-dashboard" [size]="20" iconClass="text-gray-400" />
        Tableau de bord
      </a>
      <a
        routerLink="/director/sessions"
        routerLinkActive="bg-blue-50 text-blue-700 border-blue-200"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 border border-transparent transition-colors"
      >
        <app-svg-icon name="calendar" [size]="20" iconClass="text-gray-400" />
        Sessions
      </a>
      <a
        routerLink="/director/sessions/new"
        routerLinkActive="bg-blue-50 text-blue-700 border-blue-200"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 border border-transparent transition-colors"
      >
        <app-svg-icon name="plus-circle" [size]="20" iconClass="text-gray-400" />
        Nouvelle session
      </a>
      <a
        routerLink="/director/billing"
        routerLinkActive="bg-blue-50 text-blue-700 border-blue-200"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 border border-transparent transition-colors"
      >
        <app-svg-icon name="credit-card" [size]="20" iconClass="text-gray-400" />
        Abonnement
      </a>
    </nav>
    <div class="p-3 border-t border-gray-100">
      <a routerLink="/" class="text-xs text-gray-500 hover:text-gray-800 transition-colors">← Retour au site</a>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 min-h-screen">
    <header class="h-14 shrink-0 border-b border-gray-200 bg-white flex items-center justify-between px-6 sticky top-0 z-40">
      <div class="text-sm text-gray-500 hidden sm:block">Pilotage des sessions et des créneaux</div>
      <div class="flex items-center gap-4 ml-auto">
        <a routerLink="/director/dashboard" class="text-sm text-gray-600 hover:text-gray-900 hidden sm:inline-flex items-center gap-1.5">
          <app-svg-icon name="bell" [size]="18" iconClass="text-gray-400" />
          Notifications
        </a>
        <span class="text-sm font-medium text-gray-700 max-w-[10rem] truncate">{{ auth.currentUser()?.fullName }}</span>
        <button type="button" (click)="auth.logout()" class="text-sm text-red-600 hover:text-red-700 font-medium">
          Déconnexion
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-auto">
      <router-outlet />
    </main>
  </div>
</div>
