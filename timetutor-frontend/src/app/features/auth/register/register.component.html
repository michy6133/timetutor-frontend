<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-3xl font-bold text-gray-950 mb-1">Time<span class="text-blue-600">Tutor</span></div>
      <p class="text-gray-500 text-sm">Créez votre espace école</p>
    </div>

    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
      <h1 class="text-xl font-semibold text-gray-900 mb-6">Inscrire mon établissement</h1>

      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-5">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nom de l'établissement</label>
          <input formControlName="schoolName" type="text" placeholder="Lycée Victor Hugo"
            (input)="autoSlug()"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            Identifiant unique
            <span class="text-gray-400 font-normal">(lettres, chiffres, tirets)</span>
          </label>
          <div class="flex items-center border border-gray-300 rounded-xl overflow-hidden focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/20">
            <span class="bg-gray-50 px-3 py-3 text-gray-400 text-sm border-r border-gray-300">timetutor.app/</span>
            <input formControlName="schoolSlug" type="text" placeholder="lycee-victor-hugo"
              class="flex-1 px-3 py-3 text-sm outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Votre nom complet</label>
          <input formControlName="fullName" type="text" placeholder="Marie Dupont"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email directeur</label>
          <input formControlName="email" type="email" placeholder="directeur@ecole.com"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe <span class="text-gray-400 font-normal">(min. 8 caractères)</span></label>
          <input formControlName="password" type="password" placeholder="••••••••"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <button type="submit" [disabled]="form.invalid || loading()"
          class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-blue-300 text-white font-semibold py-3 rounded-xl transition-all text-sm mt-2">
          @if (loading()) { Création en cours... } @else { Créer mon espace école }
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-5">
      Déjà inscrit ?
      <a routerLink="/login" class="text-blue-600 font-medium hover:underline">Se connecter</a>
    </p>
  </div>
</div>
