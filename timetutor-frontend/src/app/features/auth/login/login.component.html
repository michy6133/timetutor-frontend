<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-3xl font-bold text-gray-950 mb-1">Time<span class="text-blue-600">Tutor</span></div>
      <p class="text-gray-500 text-sm">Espace directeur</p>
    </div>
<!-- <div class="bg-red-500 text-white p-4">
  TEST TAILWIND
</div> -->
    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
      <h1 class="text-xl font-semibold text-gray-900 mb-6">Connexion</h1>

      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-5">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input formControlName="email" type="email" placeholder="directeur@ecole.com"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe</label>
          <input formControlName="password" type="password" placeholder="••••••••"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" />
        </div>
        <button type="submit" [disabled]="form.invalid || loading()"
          class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-blue-300 text-white font-semibold py-3 rounded-xl transition-all duration-200 text-sm">
          @if (loading()) { Connexion en cours... } @else { Se connecter }
        </button>
      </form>
    </div>

    <div class="mt-5 space-y-2 text-center text-sm text-gray-500">
      <p>Directeur ?
        <a routerLink="/register" class="text-blue-600 font-medium hover:underline">Inscrire mon école</a>
      </p>
      <p>Enseignant ?
        <a routerLink="/register-teacher" class="text-blue-600 font-medium hover:underline">Créer mon compte enseignant</a>
      </p>
    </div>
  </div>
</div>
