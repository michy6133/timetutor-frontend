<div class="max-w-2xl mx-auto px-6 py-10">
  <div class="flex items-center gap-3 mb-8">
    <a routerLink="/director/sessions" class="text-gray-400 hover:text-gray-700 text-sm">← Sessions</a>
    <span class="text-gray-300">/</span>
    <span class="text-sm text-gray-700 font-medium">Nouvelle session</span>
  </div>

  <!-- Stepper -->
  <div class="flex items-center gap-4 mb-10">
    @for (s of [1, 2]; track s) {
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all"
          [class]="step() >= s ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-400'">
          {{ s }}
        </div>
        <span class="text-sm" [class]="step() >= s ? 'text-gray-900 font-medium' : 'text-gray-400'">
          {{ s === 1 ? 'Informations' : 'Règles' }}
        </span>
      </div>
      @if (s < 2) {
        <div class="flex-1 h-px bg-gray-200"></div>
      }
    }
  </div>

  @if (error()) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-6">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <!-- Étape 1 : Infos -->
    @if (step() === 1) {
      <div class="bg-white border border-gray-200 rounded-2xl p-8 space-y-5">
        <h2 class="text-lg font-semibold text-gray-900">Informations de la session</h2>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nom de la session</label>
          <input formControlName="name" type="text" placeholder="Rentrée 2025-2026 — Terminales"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Année scolaire</label>
          <input formControlName="academicYear" type="text" placeholder="2025-2026"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Date limite de réponse</label>
          <input formControlName="deadline" type="datetime-local"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
        </div>
        <div class="flex justify-end pt-2">
          <button type="button" (click)="nextStep()" [disabled]="form.get('name')?.invalid"
            class="bg-blue-600 hover:bg-blue-500 disabled:bg-blue-300 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition-all">
            Suivant →
          </button>
        </div>
      </div>
    }

    <!-- Étape 2 : Règles -->
    @if (step() === 2) {
      <div class="bg-white border border-gray-200 rounded-2xl p-8 space-y-5">
        <h2 class="text-lg font-semibold text-gray-900">Règles de la session</h2>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Min créneaux par prof</label>
            <input formControlName="minSlotsPerTeacher" type="number" min="1"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Max créneaux par prof</label>
            <input formControlName="maxSlotsPerTeacher" type="number" min="1"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
          </div>
        </div>
        <div class="space-y-3">
          <label class="flex items-center gap-3 cursor-pointer">
            <input formControlName="allowContactRequest" type="checkbox" class="w-4 h-4 rounded accent-blue-600" />
            <span class="text-sm text-gray-700">Autoriser les demandes de contact entre enseignants</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer">
            <input formControlName="notifyDirectorOnSelection" type="checkbox" class="w-4 h-4 rounded accent-blue-600" />
            <span class="text-sm text-gray-700">Me notifier à chaque sélection de créneau</span>
          </label>
        </div>
        <div class="flex items-center justify-between pt-2">
          <button type="button" (click)="prevStep()" class="border border-gray-300 text-gray-700 font-medium px-5 py-2.5 rounded-xl text-sm hover:bg-gray-50">
            ← Retour
          </button>
          <button type="submit" [disabled]="loading()"
            class="bg-green-600 hover:bg-green-500 disabled:bg-green-300 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition-all">
            @if (loading()) { Création... } @else { Créer la session ✓ }
          </button>
        </div>
      </div>
    }
  </form>
</div>
